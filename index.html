  e31:{n:"Curl panca 60°",m:"Bicipiti",c:"I",rm:11},e32:{n:"Curl cavo basso barra",m:"Bicipiti",c:"I",rm:20},
  e33:{n:"Hammer curl 60°",m:"Bicipiti",c:"I",rm:12},
  e34:{n:"French press bilanciere EZ",m:"Tricipiti",c:"C",rm:25},e35:{n:"French press ez panca",m:"Tricipiti",c:"C",rm:20},
  e36:{n:"French press corda cavo alto",m:"Tricipiti",c:"I",rm:32},e37:{n:"French press cavo basso",m:"Tricipiti",c:"C",rm:24},
  e38:{n:"Kickback cavo basso",m:"Tricipiti",c:"I",rm:7},
  e39:{n:"Bicycle Crunch",m:"Addominali",c:"I",rm:0},e40:{n:"Crunch cavo alto",m:"Addominali",c:"I",rm:106},
  e41:{n:"Leg Raise",m:"Addominali",c:"I",rm:0},e42:{n:"Sit Up",m:"Addominali",c:"I",rm:0},
};
 
// BLOCKS: each has 4 days. Rotation: A-B-C-D
// Primary muscle = 2 target exercises, Secondary = 1 target, rest = non-target
// Day A: Petto(primary)/Spalle(secondary)/Bicipiti/Addominali
// Day B: Gambe(primary)/Dorso(secondary)/Tricipiti
// Day C: Spalle(primary)/Petto(secondary)/Bicipiti/Addominali
// Day D: Dorso(primary)/Gambe(secondary)/Tricipiti
 
const BLOCKS=[
  {id:"b1",name:"Forza Ipertrofica",icon:"🏋️",days:[
    {name:"Giorno A",primary:"Petto",secondary:"Spalle",groups:[
      {muscle:"Petto",exercises:[
        {eid:"e1",s:4,r:5,pct:82,rest:180,tgt:1},// T1 - target primary
        {eid:"e4",s:3,r:8,pct:72,rest:120,tgt:2},// T2 - target primary
        {eid:"e6",s:3,r:12,pct:60,rest:60,tgt:0},// non-target
      ]},
      {muscle:"Spalle",exercises:[
        {eid:"e24",s:3,r:8,pct:72,rest:120,tgt:3},// T3 - target secondary
        {eid:"e25",s:3,r:12,pct:65,rest:60,tgt:0},
      ]},
      {muscle:"Bicipiti",exercises:[
        {eid:"e30",s:3,r:10,pct:70,rest:60,tgt:0},
        {eid:"e31",s:3,r:12,pct:65,rest:60,tgt:0},
      ]},
      {muscle:"Addominali",exercises:[
        {eid:"e40",s:3,r:15,pct:60,rest:45,tgt:0},
      ]},
    ]},
    {name:"Giorno B",primary:"Gambe",secondary:"Dorso",groups:[
      {muscle:"Gambe",exercises:[
        {eid:"e15",s:4,r:5,pct:82,rest:180,tgt:1},
        {eid:"e16",s:3,r:8,pct:75,rest:150,tgt:2},
        {eid:"e19",s:3,r:10,pct:70,rest:90,tgt:0},
      ]},
      {muscle:"Dorso",exercises:[
        {eid:"e8",s:3,r:5,pct:85,rest:180,tgt:3},
        {eid:"e9",s:3,r:10,pct:72,rest:90,tgt:0},
        {eid:"e12",s:3,r:10,pct:70,rest:90,tgt:0},
      ]},
      {muscle:"Tricipiti",exercises:[
        {eid:"e35",s:3,r:10,pct:70,rest:60,tgt:0},
        {eid:"e36",s:3,r:12,pct:65,rest:60,tgt:0},
      ]},
    ]},
    {name:"Giorno C",primary:"Spalle",secondary:"Petto",groups:[
      {muscle:"Spalle",exercises:[
        {eid:"e22",s:4,r:5,pct:82,rest:180,tgt:1},
        {eid:"e23",s:3,r:8,pct:75,rest:120,tgt:2},
        {eid:"e26",s:3,r:12,pct:65,rest:60,tgt:0},
        {eid:"e28",s:3,r:12,pct:60,rest:60,tgt:0},
      ]},
      {muscle:"Petto",exercises:[
        {eid:"e2",s:3,r:8,pct:78,rest:120,tgt:3},
        {eid:"e5",s:3,r:10,pct:70,rest:90,tgt:0},

      ]},

      ]},
    ]},
    {name:"Giorno D",primary:"Dorso",secondary:"Gambe",groups:[
      {muscle:"Dorso",exercises:[
        {eid:"e14",s:4,r:7,pct:78,rest:150,tgt:1},
        {eid:"e10",s:3,r:8,pct:78,rest:120,tgt:2},
        {eid:"e13",s:3,r:10,pct:72,rest:90,tgt:0},
      ]},
      {muscle:"Gambe",exercises:[
        {eid:"e17",s:3,r:8,pct:78,rest:120,tgt:3},

  {id:"b2",name:"Trasformazione Ipertrofica",icon:"💪"},
  {id:"b3",name:"Qualità Muscolare",icon:"🎯"},
];
// Blocks 2 & 3 reuse block 1 days (same rotation, same targets) - in a real app these would differ slightly
BLOCKS[1].days=JSON.parse(JSON.stringify(BLOCKS[0].days));
BLOCKS[2].days=JSON.parse(JSON.stringify(BLOCKS[0].days));
 
// Phases within each block
const PHASES=[
  {id:"test",name:"Test Carichi",weeks:1},
  {id:"f1",name:"Fase 1",weeks:5},
  {id:"f2",name:"Fase 2",weeks:5},
  {id:"sc",name:"Scarico",weeks:1},
  {id:"f3",name:"Fase 3",weeks:4},
];
const totalWeeks=16;
 
// PROGRESSION LOGIC for target exercises
// tgt: 1=T1(first target primary), 2=T2(second target primary), 3=T3(target secondary)
// Returns {ds: delta sets, dr: delta reps, dw: weight multiplier}
function getProgression(weekInBlock, tgtType){
  const w=weekInBlock; // 0-based (0=test, 1-5=fase1, 6-10=fase2, 11=scarico, 12-15=fase3)
  if(tgtType===0) return {ds:0,dr:0,dw:1}; // non-target: no progression
 
  // Test carichi week
  if(w===0) return {ds:0,dr:0,dw:1};
 
  // FASE 1: weeks 1-5
  if(w>=1 && w<=2){
    return {ds:0,dr:0,dw:1}; // base
  }
  if(w===3){
    if(tgtType===1||tgtType===2) return {ds:1,dr:0,dw:1}; // +1 set on T1,T2
    return {ds:0,dr:0,dw:1}; // T3 stays
  }
  if(w>=4 && w<=5){
    return {ds:1,dr:0,dw:1}; // +1 set on all targets
  }
 
  // FASE 2: weeks 6-10
  if(w>=6 && w<=7){
    return {ds:0,dr:1,dw:1}; // reset sets, +1 rep
  }
  if(w>=8 && w<=9){
    return {ds:1,dr:1,dw:1}; // +1 set, +1 rep
  }
  if(w===10){
    if(tgtType===1||tgtType===3) return {ds:0,dr:2,dw:1}; // T1,T3: -1set from w8(=base), +2rep
    return {ds:1,dr:1,dw:1}; // T2 stays as w8-9
  }
 
  // SCARICO: week 11
  if(w===11){
    return {ds:-1,dr:0,dw:0.8}; // halved volume approx, -20% weight
  }
 
  // FASE 3: weeks 12-15 (higher weight)
  const WM=1.05; // +5% weight for fase 3
  if(w===12){
    return {ds:0,dr:0,dw:WM}; // base sets/reps but heavier
  }
  if(w===13){
    if(tgtType===1) return {ds:1,dr:0,dw:WM};  // T1: +1 set
    if(tgtType===2) return {ds:0,dr:1,dw:WM};   // T2: +1 rep
    if(tgtType===3) return {ds:1,dr:0,dw:WM};   // T3: +1 set
    return {ds:0,dr:0,dw:WM};
  }
  if(w===14){
    if(tgtType===1) return {ds:1,dr:0,dw:WM};
    if(tgtType===2) return {ds:1,dr:1,dw:WM};   // T2: +1set (from w13)
    if(tgtType===3) return {ds:0,dr:1,dw:WM};   // T3: -1set+1rep from w13
    return {ds:0,dr:0,dw:WM};
  }
  if(w===15){
    if(tgtType===1) return {ds:1,dr:-1,dw:WM*1.025}; // T1: -1rep, even more weight
    if(tgtType===2) return {ds:0,dr:-1,dw:WM};        // T2: -1set-2rep from w14 → net: base sets, base reps -1
    if(tgtType===3) return {ds:0,dr:2,dw:WM};         // T3: +1rep from w14
    return {ds:0,dr:0,dw:WM};
  }
  return {ds:0,dr:0,dw:1};
}
 
function computeExercise(base, weekInBlock, exDb){
  const prog=getProgression(weekInBlock, base.tgt);
  const sets=Math.max(1, base.s + prog.ds);
  const reps=Math.max(1, base.r + prog.dr);
  const adjPct=base.pct * prog.dw;
  const rm=exDb[base.eid]?.rm||0;
  const load=rm>0?Math.round(rm*adjPct/100*4)/4:0;
  return {sets,reps,pct:Math.round(adjPct),load,rest:base.rest};
}
 
function getPhaseForWeek(w){
  if(w===0) return PHASES[0];
  if(w<=5) return PHASES[1];
  if(w<=10) return PHASES[2];
  if(w===11) return PHASES[3];
  return PHASES[4];
}
 
// ────── APP ──────
const SK="vt-v12";
const ld=()=>{try{return JSON.parse(localStorage.getItem(SK))}catch{return null}};
const sv=d=>{try{localStorage.setItem(SK,JSON.stringify(d))}catch{}};
 
function App(){
  const savedState=ld();
  const[block,setBlock]=useState(savedState?.block||0);
  const[week,setWeek]=useState(savedState?.week||0);
  const[dayIdx,setDayIdx]=useState(0);
  const[view,setView]=useState("w");
  const[modal,setModal]=useState(null);
  const[toast,setToast]=useState("");
  const[done,setDone]=useState(savedState?.done||{});
  const[exDb,setExDb]=useState(savedState?.exDb||{...EX});
 
  useEffect(()=>{sv({block,week,done,exDb})},[block,week,done,exDb]);
  const flash=m=>{setToast(m);setTimeout(()=>setToast(""),1800)};
 
  const blk=BLOCKS[block];
  const day=blk.days[dayIdx];
  const phase=getPhaseForWeek(week);
 
  const tglDone=(gi,ei)=>{const k=`${block}-${week}-${dayIdx}-${gi}-${ei}`;setDone(d=>({...d,[k]:!d[k]}))};
